<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>cp.async Pipeline (M08)</title>
<script src="lib.js"></script>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
vizlib.injectBaseStyles();
const root = document.getElementById("root");
vizlib.header(root, "cp.async double-buffered pipeline (M08)",
  "Each K-iteration of a tiled GEMM does: load the next K-tile into shared, then compute on the previous " +
  "K-tile. With cp.async, the load is asynchronous — issue load(buf 1) before compute(buf 0), then " +
  "wait_prior(STAGES-1) before issuing the next load. This hides the load latency. Try STAGES=2 (basic " +
  "double-buffer) vs STAGES=3 (deeper pipeline), and watch how the load and compute lanes overlap. The " +
  "vertical line is the wait_prior boundary that gates the next compute.");

const ctrls = vizlib.html("div", { class: "controls" });
root.appendChild(ctrls);
const state = { stages: 2, t: 0, playing: false };

ctrls.appendChild(vizlib.slider({
  min: 2, max: 4, step: 1, value: 2, label: "STAGES",
  onChange: v => { state.stages = v; reset(); }
}).node);
ctrls.appendChild(vizlib.button("◀ rewind", () => reset()));
ctrls.appendChild(vizlib.button("step ▶", () => { step(); }));
const playBtn = vizlib.button("play", () => togglePlay());
ctrls.appendChild(playBtn);

const info = vizlib.html("div", { class: "panel stats" });
root.appendChild(info);
const svgWrap = vizlib.html("div", { class: "panel" });
root.appendChild(svgWrap);

const NUM_K = 8;
const LOAD_DUR = 4;
const COMPUTE_DUR = 4;

function reset() { state.t = 0; state.playing = false; playBtn.textContent = "play"; render(); }
function step()  { state.t = Math.min(state.t + 1, totalDuration()); render(); }
function togglePlay() {
  state.playing = !state.playing;
  playBtn.textContent = state.playing ? "pause" : "play";
  if (state.playing) tick();
}
function tick() {
  if (!state.playing) return;
  if (state.t >= totalDuration()) { state.playing = false; playBtn.textContent = "play"; return; }
  state.t += 1; render();
  setTimeout(tick, 320);
}
function totalDuration() {
  // Worst-case: serial (stages=1): NUM_K*(load+compute). With stages>=2, mostly compute-bound.
  return NUM_K*(LOAD_DUR+COMPUTE_DUR) + 4;
}

function buildSchedule() {
  // Returns arrays of {start,end,row,k,kind,buf}. row 0..S-1 are loads, row S..2S-1 are computes,
  // last row = stores. With STAGES=S we want loads to issue early so compute on iteration k+S-1 sees it.
  const S = state.stages;
  const events = [];

  // Issue plan: prologue issues S loads (k=0..S-1) at t=0, t=LOAD_GAP=1, ...
  // Then compute(k) starts after wait_prior(S-1) which means at least k load is complete.
  // For pedagogy: load[k] occupies the load lane (row=k%S) starting at issueTime[k]; compute[k] occupies
  // its compute lane after wait_prior holds (load[k] complete) starting at compTime[k] = max(compTime[k-1]+COMPUTE_DUR, loadEnd[k]).
  const issue = []; // when load[k] is issued
  const loadEnd = [];
  for (let k = 0; k < NUM_K; k++) {
    if (k < S) {
      issue.push(k * 1); // tiny stagger in prologue
    } else {
      // issued just after compute[k-S] starts (we reuse buffer)
      issue.push(Math.max(compStart(k-S, S, issue, loadEnd) + 1, (loadEnd[k-1] || 0) + 1));
    }
    loadEnd.push(issue[k] + LOAD_DUR);
  }
  function compStart(k, S, issue, loadEnd) {
    // Compute can start when its data is loaded AND previous compute finished.
    let prev = (events.find(e => e.kind==="compute" && e.k===k-1) || {end: 0}).end;
    let dataReady = loadEnd[k];
    return Math.max(prev, dataReady);
  }

  // Now actually emit events sequentially, interleaving loads and computes.
  const sBuf = new Array(S).fill(-1);
  let tNow = 0;
  const compEvents = [];
  for (let k = 0; k < NUM_K; k++) {
    const loadStart = issue[k];
    const buf = k % S;
    events.push({ kind: "load", k, buf, row: buf, start: loadStart, end: loadStart + LOAD_DUR });
  }
  // Compute events: depend on load[k] complete and compute[k-1] done.
  let prevEnd = 0;
  for (let k = 0; k < NUM_K; k++) {
    const buf = k % S;
    const loadEvt = events.find(e => e.kind==="load" && e.k===k);
    const start = Math.max(prevEnd, loadEvt.end);
    const ev = { kind: "compute", k, buf, row: S + buf, start, end: start + COMPUTE_DUR };
    events.push(ev);
    prevEnd = ev.end;
  }
  // One store at the very end.
  events.push({ kind: "store", k: NUM_K, buf: 0, row: 2*S, start: prevEnd, end: prevEnd + 2 });
  return events;
}

function render() {
  svgWrap.innerHTML = "";
  const events = buildSchedule();
  const tEnd = events.reduce((m,e) => Math.max(m, e.end), 0) + 1;
  const W = 1100, padL = 140;
  const colW = (W - padL - 30) / tEnd;
  const rowH = 30;
  const S = state.stages;
  const rows = 2*S + 1;
  const H = 60 + rows * rowH;
  const svg = vizlib.el("svg", { width: W, height: H, viewBox: `0 0 ${W} ${H}` });

  // Row labels.
  for (let r = 0; r < rows; r++) {
    let label;
    if (r < S) label = `load (buf ${r})`;
    else if (r < 2*S) label = `compute (buf ${r-S})`;
    else label = `store`;
    const t = vizlib.el("text", { x: 10, y: 50 + r*rowH + 18, "font-size": 12 });
    t.textContent = label; svg.appendChild(t);
    svg.appendChild(vizlib.el("line", { x1: padL, y1: 50 + r*rowH, x2: W-20, y2: 50 + r*rowH, stroke: "#eee" }));
  }
  // Time axis.
  for (let tt = 0; tt <= tEnd; tt += 2) {
    const x = padL + tt*colW;
    svg.appendChild(vizlib.el("line", { x1: x, y1: 40, x2: x, y2: H-10, stroke: "#f0f0f0" }));
    const tx = vizlib.el("text", { x, y: 36, "font-size": 10, "text-anchor": "middle", fill: "#888" });
    tx.textContent = tt; svg.appendChild(tx);
  }
  const ax = vizlib.el("text", { x: padL, y: 26, "font-size": 12, "font-weight": "bold" });
  ax.textContent = `STAGES = ${state.stages}, ${NUM_K} K-iterations`; svg.appendChild(ax);

  // Events.
  for (const e of events) {
    const x = padL + e.start*colW;
    const w = (e.end-e.start)*colW;
    const y = 50 + e.row * rowH + 4;
    const fill = e.kind === "load"    ? "rgba(52,152,219,0.6)" :
                 e.kind === "compute" ? "rgba(39,174,96,0.7)"  :
                                        "rgba(155,89,182,0.6)";
    const visible = e.start <= state.t;
    if (!visible) continue;
    const drawW = Math.max(0, Math.min(w, (state.t - e.start)*colW));
    svg.appendChild(vizlib.el("rect", { x, y, width: drawW, height: rowH-8, fill,
      stroke: "#333", "stroke-width": 0.6, rx: 3 }));
    if (drawW > 28) {
      const tt = vizlib.el("text", { x: x+6, y: y+rowH-13, "font-size": 11, fill: "#222" });
      tt.textContent = `${e.kind[0].toUpperCase()}${e.k}`; svg.appendChild(tt);
    }
  }

  // wait_prior boundary: vertical line at the latest compute that has actually started.
  const lastComp = events.filter(e => e.kind==="compute" && e.start <= state.t).pop();
  if (lastComp) {
    const wx = padL + lastComp.start*colW;
    svg.appendChild(vizlib.el("line", { x1: wx, y1: 40, x2: wx, y2: H-10,
      stroke: vizlib.STATUS.bad, "stroke-width": 2, "stroke-dasharray": "5,3" }));
    const wt = vizlib.el("text", { x: wx+4, y: 50, "font-size": 11, fill: vizlib.STATUS.bad });
    wt.textContent = `wait_prior(${state.stages-1}) → compute[${lastComp.k}] starts`; svg.appendChild(wt);
  }

  // Now-line.
  const nx = padL + state.t * colW;
  svg.appendChild(vizlib.el("line", { x1: nx, y1: 40, x2: nx, y2: H-10, stroke: "#000", "stroke-width": 1 }));

  svgWrap.appendChild(svg);

  // Stats.
  const overlap = events.filter(e => e.kind==="compute").reduce((s,c) => {
    const overlapping = events.filter(L => L.kind==="load" &&
      L.start < c.end && L.end > c.start);
    return s + (overlapping.length > 0 ? 1 : 0);
  }, 0);
  info.innerHTML =
    `<b>compute iterations overlapped with at least one load:</b> ${overlap}/${NUM_K} ` +
    `&nbsp;&nbsp; <b>total time:</b> ${tEnd} units &nbsp;&nbsp; ` +
    `<span style="color:#888">(STAGES=1 would be ${NUM_K*(LOAD_DUR+COMPUTE_DUR)} units; pipelining hides ` +
    `~${NUM_K*LOAD_DUR} units of load latency.)</span>`;
}

render();
</script>
</body>
</html>
